<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>OG Image Generator - HAMPI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .instructions {
      margin-bottom: 24px;
      color: #555;
      font-size: 14px;
    }
    .og-card {
      width: 1200px;
      height: 630px;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      border: 1px solid #e0e0e0;
      overflow: hidden;
    }

    /* Subtle top accent line */
    .og-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: linear-gradient(90deg, #1a3a5c, #2d5f8a, #1a3a5c);
    }

    .logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 40px;
    }
    .logo-container img {
      height: 90px;
      width: auto;
    }

    .tagline {
      font-size: 32px;
      color: #1a3a5c;
      font-weight: 500;
      letter-spacing: -0.3px;
      text-align: center;
      max-width: 800px;
      line-height: 1.3;
    }

    .separator {
      width: 60px;
      height: 3px;
      background: #1a3a5c;
      margin: 28px 0;
      border-radius: 2px;
    }

    .sub {
      font-size: 22px;
      color: #6b7b8d;
      font-weight: 400;
      text-align: center;
    }

    .domain {
      position: absolute;
      bottom: 32px;
      font-size: 18px;
      color: #a0adb8;
      font-weight: 400;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <p class="instructions">Captura este cuadro a 1200x630 (click derecho > screenshot en DevTools, o Win+Shift+S)</p>
  <div class="og-card">
    <div class="logo-container">
      <img src="hampilogo.png" alt="HAMPI">
    </div>
    <div class="tagline">Atencion y ventas con IA por WhatsApp</div>
    <div class="separator"></div>
    <div class="sub">El asistente que tu negocio necesita</div>
    <div class="domain">hampitech.com.ar</div>
  </div>
</body>
</html>
